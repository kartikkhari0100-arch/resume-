<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kk Portfolio</title>
    <!-- Google Fonts for professional typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #0f172a;
            /* Deep modern dark slate blue */
            color: #f8fafc;
            line-height: 1.6;
        }

        /* Navbar - Glassmorphism Effect */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        nav h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu a {
            margin-left: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .menu a:hover {
            color: #3b82f6;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 80vh;
            padding: 0 20px;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 30px;
            max-width: 600px;
        }

        /* Premium Gradient Button */
        .hero button {
            padding: 12px 35px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hero button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        /* Section Layouts */
        .about,
        .skills,
        .contact {
            padding: 80px 10%;
            text-align: center;
            max-width: 1100px;
            margin: 0 auto;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        /* Subtle accent line under titles */
        h2::after {
            content: '';
            display: block;
            width: 50%;
            height: 4px;
            background: #3b82f6;
            border-radius: 2px;
            margin: 8px auto 0 auto;
        }

        .about p {
            color: #94a3b8;
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Interactive Skill Badges */
        .skill-box {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .skill-badge {
            background: #1e293b;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 600;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .skill-badge:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        /* Sleek Form Styles */
        .contact form {
            max-width: 500px;
            margin: 40px auto 0 auto;
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .contact input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .contact input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .contact button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .contact button:hover {
            background: #2563eb;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            nav {
                padding: 15px 5%;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .skill-box {
                flex-direction: column;
                align-items: center;
            }

            .skill-badge {
                width: 80%;
            }

            .contact form {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <h2>Kk 🚀</h2>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>I am a Web Developer 💻</h1>
        <p>I build modern, high-performance websites with clean interfaces.</p>
        <button>Hire Me</button>
    </section>

    <section class="about">
        <h2>About Me</h2>
        <p>I am actively refining my skills in frontend development, creating slick designs, and crafting optimized user
            experiences. 🔥</p>
    </section>

    <section class="skills">
        <h2>My Skills</h2>
        <div class="skill-box">
            <div class="skill-badge">HTML</div>
            <div class="skill-badge">CSS</div>
            <div class="skill-badge">JavaScript</div>
        </div>
    </section>

    <section class="contact">
        <h2>Contact Me</h2>
        <form onsubmit="openInsta(event)">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <script src="loginform2.js"></script>
</body>

</html>
